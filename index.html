      const handleLogin = async (e) => {
        e.preventDefault();
        setAuthError(''); setIsProcessingAuth(true);
        try { await auth.signInWithEmailAndPassword(email, password); } 
        catch (err) { setAuthError(err.message || "Gagal masuk. Periksa email dan kata sandi Anda."); } 
        finally { setIsProcessingAuth(false); }
      };

        e.preventDefault();
        setAuthError(''); setAuthSuccess(''); setIsProcessingAuth(true);
        if (inputAccessCode !== ACCESS_CODE) {
          setAuthError("Kode Akses tidak valid. Silakan hubungi admin via WhatsApp.");
          setIsProcessingAuth(false);
          return;
        }

        try {
          const userCredential = await auth.createUserWithEmailAndPassword(email, password);
          const newUser = userCredential.user;
          await db.collection('users').doc(newUser.uid).set({ email: newUser.email, createdAt: firebase.firestore.FieldValue.serverTimestamp() });

              redirect: 'follow',
              body: JSON.stringify({ action: 'register', email: newUser.email, uid: newUser.uid })

        finally { setIsProcessingAuth(false); }
      };

        catch (err) { setAuthError(err.message || "Gagal mengirim email reset."); } 
        finally { setIsProcessingAuth(false); }

        const message = encodeURIComponent("Halo Admin, saya tertarik menggunakan aplikasi InfographicPrompt.AI. Boleh minta kode akses registrasinya?");
        window.open(`https://wa.me/${WA_ADMIN}?text=${message}`, '_blank');

        setCentralObjects(newObjects);

      // ==========================================

      // ==========================================

        if (!currentDesc.trim()) return;
        setEnhancing(prev => ({ ...prev, [index]: true }));
        setEnhanceSuccess(prev => ({ ...prev, [index]: false }));

          let activeKey = "";
          let modelsToTry = [];

            activeKey = canvasApiKey.trim();
            modelsToTry = ["gemini-2.5-flash-preview-09-2025"];

              throw new Error("API_KEY_KOSONG");

            // Daftar Model yang akan dicoba berurutan otomatis jika terjadi error 404 (Model Not Found)

                "gemini-1.5-flash-latest",
                "gemini-1.5-flash",
                "gemini-1.5-pro-latest",

            ];
          }

          const systemInstruction = "You are an expert prompt engineer. Translate the user's short or messy description into English (if it isn't already). Then, enhance it into a highly visual, detailed, and captivating element suitable for a 3D infographic rendering prompt. Focus on materials, textures, lighting interactions, and spatial context. Keep it to 1-2 concise sentences. Return ONLY the enhanced text, with no conversational filler, quotes, or explanations.";
          
          let successData = null;
          let lastErrorMsg = "";

          // 2. Loop Auto-Fallback Model (Mencoba daftar model satu per satu tanpa hambatan)
          for (const model of modelsToTry) {
              const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${activeKey}`;
              
              try {
                  const response = await fetch(url, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({
                          contents: [{ parts: [{ text: currentDesc }] }],
                          systemInstruction: { parts: [{ text: systemInstruction }] }
                      })
                  });

                  if (response.ok) {
                      successData = await response.json();
                      break; // Berhasil! Keluar dari loop percobaan
                  } else {
                      const errData = await response.json().catch(()=>({}));
                      lastErrorMsg = errData?.error?.message || `HTTP Error Status: ${response.status}`;
                      console.warn(`Model ${model} ditolak oleh Google. Mencoba model selanjutnya... (${lastErrorMsg})`);
                  }
              } catch (fetchErr) {
                  lastErrorMsg = fetchErr.message;
                  console.warn(`Fetch error pada ${model}:`, fetchErr);
              }
          }

          // Jika semua model dalam daftar ditolak
          if (!successData) {
              throw new Error(lastErrorMsg || "Semua model API Gemini tidak tersedia untuk akun Anda.");
          }
          
          // Terapkan hasil jika sukses
          if (successData?.candidates?.[0]?.content?.parts?.[0]?.text) {
              const enhancedText = successData.candidates[0].content.parts[0].text.trim();
              handleObjectChange(index, 'desc', enhancedText);
              
              setEnhanceSuccess(prev => ({ ...prev, [index]: true }));
              setTimeout(() => {
                  setEnhanceSuccess(prev => ({ ...prev, [index]: false }));
              }, 3000); 
          } else {
              throw new Error("Format balasan API Gemini tidak valid atau kosong.");
          }

        } catch (error) {
          console.error("AI Enhancement failed:", error);
          
          if (error.message === "API_KEY_KOSONG") {
             alert("⛔ API Key Gemini Belum Diatur!\n\nAgar fitur AI ini bisa berfungsi di situs Vercel Anda, silakan buka kode 'index.html' dan masukkan API Key Gemini milik Anda pada baris kode:\nconst GEMINI_API_KEY_VERCEL = 'ISI_KEY_ANDA_DISINI';");
          } else {
             alert(`Gagal memproses AI.\n\nDetail Error: ${error.message}\n\nSaran: Pastikan API Key Anda valid dan memiliki kuota. Anda juga bisa mencoba membuat API Key baru di Google AI Studio.`);
          }
        } finally {
          setEnhancing(prev => ({ ...prev, [index]: false }));
        }
      };

      useEffect(() => {
        generatePrompt();
      }, [topic, infographicTitle, centralObjects, selectedStyle, selectedElements, selectedColors, selectedLighting, selectedBackground, selectedCamera, selectedRender, selectedSize]);

      const generatePrompt = () => {
        const safeTopic = topic.trim() || "[Insert Topic Here]";
        const titleStr = infographicTitle.trim() ? ` The design prominently features a stylized 3D typography text reading "${infographicTitle.trim()}".` : '';
        
        const validObjects = centralObjects.filter(obj => obj.desc.trim() !== '');
        const objectsStrArray = validObjects.map(obj => {
          let str = obj.desc.trim();
          if (obj.text.trim()) str += `, seamlessly incorporating bold 3D text that reads "${obj.text.trim()}"`;
          return str;
        });

        const objectsStr = objectsStrArray.length > 0 
          ? `The central focus includes several key detailed elements: ${objectsStrArray.join('; and ')}.` 
          : `The central focus is a detailed [Insert Main Subject Here].`;
        
        const elementsStr = selectedElements.length > 0 ? `It is surrounded by ${selectedElements.join(', ')}.` : '';
        const renderStr = selectedRender.length > 0 ? selectedRender.join(', ') : '';
        const arParam = selectedSize ? `The aspect ratio should be ${selectedSize}.` : '';

        const generated = `A high-quality 3D infographic design about ${safeTopic}.${titleStr} ${objectsStr} ${elementsStr} The art style is ${selectedStyle}, utilizing a ${selectedColors}. Illuminated by ${selectedLighting}, set against a ${selectedBackground}. ${selectedCamera}. ${renderStr}. ${arParam}`.trim();
        setPrompt(generated);
      };

      const downloadPromptTxt = () => {
        if (!prompt) return;
        const element = document.createElement("a");
        const file = new Blob([prompt], {type: 'text/plain'});
        element.href = URL.createObjectURL(file);
        element.download = `Prompt_Infografis_3D_${new Date().getTime()}.txt`;
        document.body.appendChild(element); element.click(); document.body.removeChild(element);
      };

      const copyToClipboard = async () => {
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(prompt);
            setIsCopied(true); setTimeout(() => setIsCopied(false), 2000); return;
          }
        } catch (e) { console.warn("Fallback copy", e); }

        const textArea = document.createElement("textarea");
        textArea.value = prompt; textArea.style.position = "fixed"; textArea.style.opacity = "0";
        document.body.appendChild(textArea);
        
        if (navigator.userAgent.match(/ipad|iphone/i)) {
            textArea.contentEditable = true; textArea.readOnly = false;
            const range = document.createRange(); range.selectNodeContents(textArea);
            const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
            textArea.setSelectionRange(0, 999999);
        } else { textArea.focus(); textArea.select(); }

        try { if (document.execCommand('copy')) { setIsCopied(true); setTimeout(() => setIsCopied(false), 2000); } } 
        catch (err) {} finally { document.body.removeChild(textArea); }
      };

      const handleReset = () => {
        setTopic(''); setInfographicTitle(''); setCentralObjects([{ desc: '', text: '' }]);
        setSelectedStyle('Isometric 3D'); setSelectedElements(['floating data visualizations', 'percentage tags']);
        setSelectedColors('Vibrant corporate colors'); setSelectedLighting('Studio lighting with soft shadows');
        setSelectedBackground('clean minimal solid pastel background'); setSelectedCamera('Isometric perspective');
        setSelectedRender(['Octane Render', '8k resolution', 'highly detailed']); setSelectedSize('16:9');
      };

      if (authLoading) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-[#030712] text-cyan-400">
            <Icon name="Loader2" className="w-10 h-10 animate-spin" />
          </div>
        );
      }

      // TAMPILAN AUTENTIKASI (LOGIN/REGISTER/FORGOT)
      if (currentView !== 'app') {
        return (
          <div className="min-h-screen relative flex items-center justify-center p-4 overflow-hidden">
            <div className="absolute inset-0 z-0">
              <div 
                className="absolute inset-0 bg-cover bg-center bg-no-repeat opacity-50"
                style={{ backgroundImage: "url('https://images.unsplash.com/photo-1639322537228-f710d846310a?q=80&w=2832&auto=format&fit=crop')" }}
              ></div>
              <div className="absolute inset-0 bg-[#030712]/70 backdrop-blur-[8px]"></div>
              <div className="absolute top-1/4 left-1/4 w-[40vw] h-[40vw] bg-cyan-500/30 rounded-full blur-[120px] animate-glow mix-blend-screen"></div>
              <div className="absolute bottom-1/4 right-1/4 w-[30vw] h-[30vw] bg-purple-500/30 rounded-full blur-[100px] animate-glow mix-blend-screen" style={{ animationDelay: '2s' }}></div>
              <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] [mask-image:linear-gradient(to_bottom,white,transparent)] opacity-60"></div>
            </div>

            <div className="w-full max-w-md glass-panel p-8 rounded-3xl z-10 relative border-white/10 shadow-[0_20px_60px_-10px_rgba(0,0,0,0.8)]">
              <div className="text-center mb-8">
                <div className="inline-flex p-3 rounded-2xl bg-cyan-500/10 border border-cyan-500/30 mb-4 shadow-[0_0_20px_rgba(6,182,212,0.3)]">
                  <Icon name="Box" className="w-8 h-8 text-cyan-400" />
                </div>
                <h1 className="text-2xl font-black text-white tracking-tight">InfographicPrompt<span className="text-cyan-400">.AI</span></h1>
                <p className="text-sm text-slate-400 mt-2">Aplikasi Pembuat Prompt Infografis Otomatis</p>
              </div>

              {authError && <div className="mb-4 p-3 bg-rose-500/10 border border-rose-500/30 rounded-xl text-rose-400 text-sm text-center">{authError}</div>}
              {authSuccess && <div className="mb-4 p-3 bg-emerald-500/10 border border-emerald-500/30 rounded-xl text-emerald-400 text-sm text-center">{authSuccess}</div>}

              {currentView === 'login' && (
                <form onSubmit={handleLogin} className="space-y-4">
                  <div>
                    <label className="block text-xs font-semibold text-cyan-400 uppercase tracking-wider mb-2">ALAMAT EMAIL</label>
                    <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} className="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none text-white transition-all" placeholder="nama@email.com" />
                  </div>
                  <div>
                    <div className="flex justify-between items-center mb-2">
                      <label className="block text-xs font-semibold text-cyan-400 uppercase tracking-wider">KATA SANDI</label>
                      <button type="button" onClick={() => {setCurrentView('forgot'); setAuthError(''); setAuthSuccess('');}} className="text-xs text-slate-400 hover:text-cyan-300 transition-colors">Lupa sandi?</button>
                    </div>
                    <input type="password" required value={password} onChange={e=>setPassword(e.target.value)} className="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none text-white transition-all" placeholder="••••••••" />
                  </div>
                  <button type="submit" disabled={isProcessingAuth} className="w-full py-3.5 mt-2 bg-gradient-to-r from-cyan-600 to-indigo-600 hover:from-cyan-500 hover:to-indigo-500 text-white font-bold rounded-xl shadow-[0_0_15px_rgba(6,182,212,0.4)] transition-all flex justify-center items-center">
                    {isProcessingAuth ? <Icon name="Loader2" className="w-5 h-5 animate-spin" /> : "Login"}
                  </button>
                  <p className="text-center text-sm text-slate-400 mt-6">
                    Belum punya akses? <button type="button" onClick={() => {setCurrentView('register'); setAuthError(''); setAuthSuccess('');}} className="text-cyan-400 hover:text-cyan-300 font-bold ml-1">SignUp</button>
                  </p>
                </form>
              )}

              {currentView === 'register' && (
                <form onSubmit={handleRegister} className="space-y-4">
                  <div>
                    <label className="block text-xs font-semibold text-cyan-400 uppercase tracking-wider mb-2">ALAMAT EMAIL</label>
                    <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} className="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl focus:border-cyan-500 outline-none text-white" placeholder="nama@email.com" />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-cyan-400 uppercase tracking-wider mb-2">KATA SANDI BARU</label>
                    <input type="password" required value={password} onChange={e=>setPassword(e.target.value)} className="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl focus:border-cyan-500 outline-none text-white" placeholder="Min. 6 karakter" />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-purple-400 uppercase tracking-wider mb-2">KODE AKSES KHUSUS</label>
                    <input type="text" required value={inputAccessCode} onChange={e=>setInputAccessCode(e.target.value)} className="w-full px-4 py-3 bg-purple-900/10 border border-purple-500/50 rounded-xl focus:border-purple-400 outline-none text-white text-center tracking-widest uppercase font-mono" placeholder="MASUKKAN KODE" />
                    <button type="button" onClick={contactAdminWhatsApp} className="mt-3 w-full py-2.5 bg-emerald-500/10 border border-emerald-500/30 hover:bg-emerald-500/20 text-emerald-400 text-sm font-semibold rounded-lg flex items-center justify-center gap-2 transition-all">
                      <Icon name="MessageCircle" className="w-4 h-4" /> Minta Kode via WhatsApp Admin
                    </button>
                  </div>
                  <button type="submit" disabled={isProcessingAuth} className="w-full py-3.5 mt-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold rounded-xl shadow-[0_0_15px_rgba(147,51,234,0.4)] transition-all flex justify-center items-center">
                    {isProcessingAuth ? <Icon name="Loader2" className="w-5 h-5 animate-spin" /> : "Buat Akun Sekarang"}
                  </button>
                  <p className="text-center text-sm text-slate-400 mt-6">
                    Sudah punya akses? <button type="button" onClick={() => {setCurrentView('login'); setAuthError(''); setAuthSuccess('');}} className="text-cyan-400 hover:text-cyan-300 font-bold ml-1">Masuk di sini</button>
                  </p>
                </form>
              )}

              {currentView === 'forgot' && (
                <form onSubmit={handleForgotPassword} className="space-y-4">
                  <p className="text-sm text-slate-400 text-center mb-6">Masukkan email yang terdaftar. Kami akan mengirimkan tautan untuk mengatur ulang kata sandi Anda.</p>
                  <div>
                    <label className="block text-xs font-semibold text-cyan-400 uppercase tracking-wider mb-2">ALAMAT EMAIL</label>
                    <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} className="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl focus:border-cyan-500 outline-none text-white" placeholder="nama@email.com" />
                  </div>
                  <button type="submit" disabled={isProcessingAuth} className="w-full py-3.5 mt-2 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white font-bold rounded-xl transition-all flex justify-center items-center">
                    {isProcessingAuth ? <Icon name="Loader2" className="w-5 h-5 animate-spin" /> : "Kirim Tautan Reset"}
                  </button>
                  <p className="text-center text-sm text-slate-400 mt-6">
                    Ingat sandi Anda? <button type="button" onClick={() => {setCurrentView('login'); setAuthError(''); setAuthSuccess('');}} className="text-cyan-400 hover:text-cyan-300 font-bold ml-1">Kembali ke Login</button>
                  </p>
                </form>
              )}
            </div>
          </div>
        );
      }

      // TAMPILAN APLIKASI UTAMA
      return (
        <div className="min-h-screen bg-[#030712] text-slate-300 font-sans pb-12 relative overflow-hidden selection:bg-cyan-500/30 selection:text-white">
          <div className="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
            <div className="absolute top-[-20%] left-[-10%] w-[50vw] h-[50vw] bg-indigo-900/20 rounded-full blur-[120px] animate-glow"></div>
            <div className="absolute bottom-[-20%] right-[-10%] w-[40vw] h-[40vw] bg-cyan-900/20 rounded-full blur-[100px] animate-glow" style={{ animationDelay: '2s' }}></div>
            <div className="absolute top-[30%] left-[60%] w-[30vw] h-[30vw] bg-purple-900/15 rounded-full blur-[100px]"></div>
            <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] [mask-image:linear-gradient(to_bottom,white,transparent)]"></div>
          </div>

          <div className="relative z-10">
            <header className="border-b border-white/5 glass-panel pt-8 pb-8 px-4 mb-10 sticky top-0 z-40">
              <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                <div className="flex items-center gap-4">
                  <div className="relative">
                    <div className="absolute inset-0 bg-cyan-400 blur-lg opacity-50"></div>
                    <div className="relative bg-gradient-to-br from-slate-800 to-slate-900 p-3 rounded-2xl border border-white/10">
                      <Icon name="Box" className="w-8 h-8 text-cyan-400" />
                    </div>
                  </div>
                  <div>
                    <h1 className="text-3xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-indigo-400 to-purple-500 drop-shadow-[0_0_10px_rgba(56,189,248,0.2)]">
                      InfographicPrompt.AI
                    </h1>
                    <p className="text-slate-400 mt-1 text-sm font-medium tracking-wide flex items-center gap-2">
                      <span className="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></span>
                      Aplikasi Pembuat Prompt Infografis Otomatis
                    </p>
                  </div>
                </div>
                
                <div className="flex gap-3">
                  <button onClick={handleReset} className="flex items-center gap-2 px-5 py-2.5 bg-slate-800/80 hover:bg-slate-700 text-slate-300 rounded-xl transition-all border border-slate-700 hover:border-cyan-500/50 font-medium text-sm group">
                    <Icon name="RefreshCw" className="w-4 h-4 group-hover:rotate-180 transition-transform duration-500" /> Reset
                  </button>
                  <button onClick={handleLogout} className="flex items-center gap-2 px-5 py-2.5 bg-rose-900/20 hover:bg-rose-900/40 text-rose-400 rounded-xl transition-all border border-rose-900/50 hover:border-rose-500/50 font-medium text-sm">
                    <Icon name="LogOut" className="w-4 h-4" /> Keluar
                  </button>
                </div>
              </div>
            </header>

            <main className="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
              <div className="lg:col-span-8 space-y-2">
                
                <Section title="Topik Utama & Judul" iconName="Settings2">
                  <div className="space-y-6">
                    <div>
                      <label className="block text-sm font-semibold text-slate-300 mb-2">Tema Besar Infografis</label>
                      <input type="text" value={topic} onChange={(e) => setTopic(e.target.value)} placeholder="Contoh: Perkembangan Teknologi AI di 2024..." className="w-full px-5 py-4 bg-slate-950/50 border border-slate-700/50 rounded-xl focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition-all text-white placeholder-slate-600 shadow-inner" />
                    </div>
                    <div className="pt-2">
                      <label className="flex items-center gap-2 text-sm font-semibold text-slate-300 mb-2">
                        <Icon name="Type" className="w-4 h-4 text-purple-400" /> Teks Judul Mengambang (Opsional)
                      </label>
                      <input type="text" value={infographicTitle} onChange={(e) => setInfographicTitle(e.target.value)} placeholder="Misal: 'AI REVOLUTION'" className="w-full px-5 py-4 bg-slate-950/50 border border-slate-700/50 rounded-xl focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition-all text-white placeholder-slate-600 shadow-inner" />
                    </div>
                  </div>
                </Section>

                <Section title="Detail Objek Sentral & Label Teks" iconName="Box">
                  <p className="text-sm text-slate-400 mb-5">Deskripsikan objek visual, lalu masukkan label teksnya. <span className="text-amber-400">Tombol AI akan menyempurnakan kualitas prompt Anda.</span></p>
                  <div className="space-y-4">
                    {centralObjects.map((obj, index) => (
                      <div key={index} className="flex gap-4 items-start p-6 bg-slate-950/60 border border-slate-800 rounded-2xl group hover:border-slate-600 transition-colors shadow-inner">
                        <span className="flex-shrink-0 w-8 h-8 mt-1 bg-gradient-to-br from-cyan-900 to-indigo-900 text-cyan-300 border border-cyan-800/50 rounded-full flex items-center justify-center font-bold text-sm shadow-[0_0_10px_rgba(6,182,212,0.2)]">{index + 1}</span>
                        <div className="w-full flex flex-col gap-5">
                          
                          <div className="space-y-2">
                            <label className="text-xs font-semibold text-cyan-400 uppercase tracking-wider flex items-center gap-1.5"><Icon name="ImageIcon" className="w-3.5 h-3.5" /> Bentuk Visual Objek</label>
                            <textarea value={obj.desc} onChange={(e) => handleObjectChange(index, 'desc', e.target.value)} placeholder="Contoh: Sebuah diagram batang 3D yang transparan seperti kaca neon..." rows={2} className="w-full px-4 py-3 bg-slate-900/80 border border-slate-700 focus:border-cyan-500 outline-none transition-all text-white placeholder-slate-500 resize-none leading-relaxed rounded-xl" />
                          </div>

                          <div className="space-y-2">
                            <label className="text-xs font-semibold text-emerald-400 uppercase tracking-wider flex items-center gap-1.5"><Icon name="AlignLeft" className="w-3.5 h-3.5" /> Label Teks Menempel (Opsional)</label>
                            <input type="text" value={obj.text} onChange={(e) => handleObjectChange(index, 'text', e.target.value)} placeholder="Contoh: +85% Profit" className="w-full px-4 py-3 bg-slate-900/80 border border-slate-700 focus:border-emerald-500 outline-none transition-all text-white placeholder-slate-500 rounded-xl" />
                          </div>
                          
                          <div className="flex justify-between items-center mt-2 border-t border-slate-800/50 pt-5">
                            <button 
                              onClick={() => enhanceObjectWithAI(index, obj.desc)} 
                              disabled={enhancing[index] || enhanceSuccess[index] || !obj.desc.trim()} 
                              className={`relative overflow-hidden flex items-center gap-2 text-sm font-bold px-5 py-2.5 rounded-xl transition-all border disabled:opacity-80 disabled:cursor-not-allowed ${
                                enhanceSuccess[index] 
                                  ? 'text-emerald-300 bg-emerald-900/30 border-emerald-500/50 shadow-[0_0_15px_rgba(16,185,129,0.2)]' 
                                  : 'text-amber-300 bg-amber-900/20 hover:bg-amber-900/40 border-amber-700/50 hover:shadow-[0_0_15px_rgba(251,191,36,0.15)]'
                              }`}
                            >
                              {enhancing[index] && <div className="absolute inset-0 bg-amber-500/10 animate-pulse"></div>}
                              
                              {enhanceSuccess[index] ? (
                                <Icon name="CheckCircle2" className="w-4 h-4 relative z-10" />
                              ) : (
                                <Icon name={enhancing[index] ? "Loader2" : "Wand2"} className={`w-4 h-4 relative z-10 ${enhancing[index] ? 'animate-spin' : ''}`} />
                              )}
                              
                              <span className="relative z-10">
                                {enhanceSuccess[index] ? 'Berhasil Dipoles!' : enhancing[index] ? 'Memoles Visual...' : 'Poles Visual dengan AI Server'}
                              </span>
                            </button>
                            {centralObjects.length > 1 && (
                              <button onClick={() => removeObjectField(index)} className="text-xs flex items-center gap-1.5 text-rose-400 hover:text-white hover:bg-rose-500/20 px-3 py-2 rounded-lg transition-colors border border-transparent hover:border-rose-500/30">
                                <Icon name="Trash2" className="w-4 h-4" /> Hapus
                              </button>
                            )}
                          </div>
                        </div>
                      </div>
                    ))}
                    <div className="pt-3">
                      <button onClick={addObjectField} className="flex items-center gap-2 px-5 py-4 text-sm font-bold text-cyan-400 bg-cyan-900/10 hover:bg-cyan-900/30 rounded-xl transition-all border border-cyan-800/50 hover:border-cyan-400/50 hover:shadow-[0_0_15px_rgba(6,182,212,0.1)] w-full justify-center border-dashed">
                        <Icon name="Plus" className="w-5 h-5" /> Tambah Objek Visual Lainnya
                      </button>
                    </div>
                  </div>
                </Section>

                <Section title="Ukuran & Rasio Render" iconName="Maximize">
                  <SingleSelectGrid options={sizeOptions} selected={selectedSize} setSelected={setSelectedSize} />
                </Section>
                <Section title="Art Style 3D" iconName="ImageIcon">
                  <SingleSelectGrid options={styles} selected={selectedStyle} setSelected={setSelectedStyle} />
                </Section>
                <Section title="Elemen Dekoratif Data" iconName="Box">
                  <MultiSelectGrid options={dataElementsOptions} selected={selectedElements} stateSetter={setSelectedElements} />
                </Section>
                <Section title="Palet Warna Dominan" iconName="Palette">
                  <SingleSelectGrid options={colors} selected={selectedColors} setSelected={setSelectedColors} />
                </Section>
                <Section title="Pencahayaan (Lighting)" iconName="Lightbulb">
                  <SingleSelectGrid options={lightings} selected={selectedLighting} setSelected={setSelectedLighting} />
                </Section>
                <Section title="Latar Belakang (Environment)" iconName="ImageIcon">
                  <SingleSelectGrid options={backgrounds} selected={selectedBackground} setSelected={setSelectedBackground} />
                </Section>
                <Section title="Kamera & Sudut Pandang" iconName="Camera">
                  <SingleSelectGrid options={cameras} selected={selectedCamera} setSelected={setSelectedCamera} />
                </Section>
                <Section title="Kualitas Mesin Render" iconName="Sparkles">
                  <MultiSelectGrid options={renderOptions} selected={selectedRender} stateSetter={setSelectedRender} />
                </Section>
              </div>

              <div className="lg:col-span-4">
                <div className="sticky top-32 glass-panel p-6 rounded-3xl relative overflow-hidden">
                  <div className="flex items-center justify-between mb-5 border-b border-slate-700/50 pb-5">
                    <h2 className="text-lg font-bold text-white flex items-center gap-2">
                      <Icon name="Terminal" className="w-5 h-5 text-cyan-400" /> Output Code (Prompt)
                    </h2>
                    <div className="flex gap-1.5">
                      <div className="w-3 h-3 rounded-full bg-rose-500/80 shadow-[0_0_5px_rgba(244,63,94,0.5)]"></div>
                      <div className="w-3 h-3 rounded-full bg-amber-500/80 shadow-[0_0_5px_rgba(245,158,11,0.5)]"></div>
                      <div className="w-3 h-3 rounded-full bg-emerald-500/80 shadow-[0_0_5px_rgba(16,185,129,0.5)]"></div>
                    </div>
                  </div>
                  
                  <div className="bg-[#02040a] rounded-xl p-5 mb-6 relative border border-white/10 shadow-inner min-h-[150px]">
                    <div className="absolute inset-0 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_4px,3px_100%] pointer-events-none opacity-20 rounded-xl"></div>
                    <p className="text-emerald-400 text-sm leading-relaxed font-mono relative z-10 selection:bg-emerald-500/30 break-words">
                      <span className="text-slate-600 select-none">{'> '}</span>
                      {prompt}
                      <span className="inline-block w-2 h-4 bg-emerald-400 ml-1 animate-pulse align-middle shadow-[0_0_8px_rgba(52,211,153,0.8)]"></span>
                    </p>
                  </div>

                  <div className="flex flex-col sm:flex-row gap-3">
                    <button onClick={copyToClipboard} className={`flex-1 py-3.5 px-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all duration-300 relative overflow-hidden ${isCopied ? 'bg-emerald-500 text-white shadow-[0_0_20px_rgba(16,185,129,0.4)]' : 'bg-gradient-to-r from-cyan-600 to-indigo-600 text-white hover:from-cyan-500 hover:to-indigo-500 shadow-[0_0_15px_rgba(6,182,212,0.3)] hover:shadow-[0_0_25px_rgba(99,102,241,0.5)] scale-100 hover:scale-[1.02]'}`}>
                      {isCopied ? <><Icon name="CheckCircle2" className="w-5 h-5 animate-bounce" /> Tersalin!</> : <><Icon name="Copy" className="w-5 h-5" /> Salin Prompt</>}
                    </button>
                    <button onClick={downloadPromptTxt} className="py-3.5 px-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all duration-300 bg-slate-800 text-slate-300 hover:bg-slate-700 hover:text-white border border-slate-600 hover:border-cyan-500" title="Unduh File .TXT">
                      <Icon name="Download" className="w-5 h-5" /> TXT
                    </button>
                  </div>

                  <div className="mt-8 relative">
                    <div className="absolute -inset-1 bg-gradient-to-r from-cyan-500/10 to-purple-500/10 rounded-xl blur"></div>
                    <div className="relative bg-slate-900/60 backdrop-blur-md p-5 rounded-xl border border-white/5 text-xs text-slate-400">
                      <p className="font-bold text-white mb-3 flex items-center gap-2 uppercase tracking-wider text-[10px]">
                        <Icon name="Lightbulb" className="w-4 h-4 text-amber-400" /> System Guide
                      </p>
                      <ul className="space-y-3">
                        <li className="flex gap-2 items-start"><span className="text-cyan-500 mt-0.5 font-bold">1.</span> <span className="flex-1">Pilih gaya visual, warna, hingga kamera di sebelah kiri.</span></li>
                        <li className="flex gap-2 items-start"><span className="text-cyan-500 mt-0.5 font-bold">2.</span> <span className="flex-1">Gunakan fitur <strong className="text-amber-300">AI Server</strong> untuk memoles deskripsi objek.</span></li>
                        <li className="flex gap-2 items-start"><span className="text-cyan-500 mt-0.5 font-bold">3.</span> <span className="flex-1">Salin hasil prompt bahasa Inggris pada terminal di atas.</span></li>
                        <li className="flex gap-2 items-start">
                          <span className="text-cyan-500 mt-0.5 font-bold">4.</span> 
                          <div className="flex flex-col gap-1.5 flex-1">
                            <span>Bawa prompt ini ke Generator Gambar:</span>
                            <div className="bg-slate-950/80 p-3 rounded-lg border border-slate-700/50 text-slate-300 space-y-2 mt-1 shadow-inner">
                              <p className="flex items-center gap-2"><span className="w-1.5 h-1.5 rounded-full bg-amber-400 shadow-[0_0_5px_#fbbf24]"></span> Buka <a href="https://gemini.google.com" target="_blank" className="text-amber-300 hover:text-amber-200 font-bold transition-colors underline decoration-amber-500/50 underline-offset-2">gemini.google.com</a></p>
                              <p className="flex items-center gap-2"><span className="w-1.5 h-1.5 rounded-full bg-cyan-400 shadow-[0_0_5px_#22d3ee]"></span> Buat jendela obrolan baru</p>
                              <p className="flex items-center gap-2"><span className="w-1.5 h-1.5 rounded-full bg-emerald-400 shadow-[0_0_5px_#34d399]"></span> <strong>"Paste"</strong> prompt dan Render!</p>
                            </div>
                          </div>
                        </li>
                      </ul>
                    </div>
                  </div>
                </div>
              </div>
            </main>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
